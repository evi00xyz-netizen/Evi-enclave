services:
  agent:
    image: ubuntu:22.04
    platform: linux/amd64
    container_name: erc8004-agent
    environment:
      # Production deployment variables (set as secrets on Phala)
      - GITHUB_REPO=${GITHUB_REPO:-https://github.com/Phala-Network/erc-8004-tee-agent.git}
      - GIT_COMMIT_HASH=${GIT_COMMIT_HASH:-HEAD}
      - UPDATE_CODE=${UPDATE_CODE:-false}
      - TRUST_CENTER_URL=${TRUST_CENTER_URL:-https://trust.phala.com/widget/app/${DSTACK_APP_ID}}

      # Agent configuration
      - AGENT_DOMAIN=${DSTACK_APP_ID}-8000.${DSTACK_GATEWAY_DOMAIN}
      - AGENT_SALT=${AGENT_SALT}

      # Blockchain configuration
      - RPC_URL=${RPC_URL:-https://mainnet.base.org}
      - CHAIN_ID=${CHAIN_ID:-8453}

      # Subgraph API Key (required for The Graph Gateway)
      - SUBGRAPH_API_KEY=${SUBGRAPH_API_KEY}

      # Contract addresses (ETH Sepolia defaults)
      - IDENTITY_REGISTRY_ADDRESS=${IDENTITY_REGISTRY_ADDRESS:-0x8004A818BFB912233c491871b3d84c89A494BD9e}
      - REPUTATION_REGISTRY_ADDRESS=${REPUTATION_REGISTRY_ADDRESS:-0x8004B663056A597Dffe9eCcC1965A193B7388713}

      # Server configuration
      - AGENT_HOST=${AGENT_HOST:-0.0.0.0}
      - AGENT_PORT=${AGENT_PORT:-80}

      # Redpill configuration
      - REDPILL_API_KEY=${REDPILL_API_KEY}
      - REDPILL_API_URL=${REDPILL_API_URL:-https://api.redpill.ai}
      - AI_MODEL=${AI_MODEL:-phala/qwen-2.5-7b-instruct}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.3}
      - AI_MAX_TOKENS={AI_MAX_TOKENS:-2000}

      # Anthropic SDK configuration (for chat interface via Redpill)
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-${REDPILL_API_KEY}}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.redpill.ai}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-openai/gpt-oss-120b}
      - CODE_EXECUTION_TIMEOUT=${CODE_EXECUTION_TIMEOUT:-30}

    volumes:
      - app_data:/app
      - /var/run/dstack.sock:/var/run/dstack.sock
    ports:
      - "8000:80"
    restart: unless-stopped
    networks:
      - agent-network
    entrypoint: /bin/bash
    command:
      - -c
      - |
        apt-get update &&
        apt-get install -y git &&
        mkdir -p /app/.state &&
        if [ ! -f /app/.state/initialized ] || [ \"$$UPDATE_CODE\" = \"true\" ]; then
          echo '🔄 Cloning repository from $$GITHUB_REPO...' &&
          cd /tmp &&
          git clone $$GITHUB_REPO repo &&
          cd repo &&
          git checkout $$GIT_COMMIT_HASH &&
          echo '✅ Checked out commit $$GIT_COMMIT_HASH' &&
          cp -r /tmp/repo/* /app/ &&
          cp -r /tmp/repo/.* /app/ 2>/dev/null || true &&
          rm -rf /tmp/repo &&
          touch /app/.state/initialized &&
          echo '✅ Repository initialized successfully';
        else
          echo '✅ Repository already initialized (UPDATE_CODE=false)';
        fi &&
        cd /app &&
        echo '🚀 Starting agent from entrypoint.sh...' &&
        exec bash /app/entrypoint.sh

volumes:
  app_data:

networks:
  agent-network:

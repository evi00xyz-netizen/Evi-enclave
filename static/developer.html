<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEE Agent - Developer Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/chat.css">
    <script src="/static/wallet-utils.js"></script>
    <script src="/static/trust-center.js"></script>
    <script src="/static/chat.js"></script>
    <style>
        body {
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        @media (max-width: 768px) {
            .page-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body class="text-white">
    <div class="page-container">
        <!-- Header -->
        <div class="mb-6">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-2xl font-semibold flex items-center gap-3">
                    <span class="text-3xl">🤖</span>
                    TEE Agent Chat
                </h1>
                <div class="flex gap-2">
                    <button onclick="startNewSession()" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        New Session
                    </button>
                    <a href="/funding" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">Funding</a>
                    <a href="/dashboard" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">Dashboard</a>
                </div>
            </div>
            <p class="text-gray-400 text-sm">Interact with your TEE agent running in a secure Intel TDX enclave</p>
        </div>

        <!-- Agent Status Card (Collapsed) -->
        <div id="agentStatusCollapsed" class="agent-status-collapsed mb-4" onclick="toggleStatusExpanded()">
            <div id="statusIndicators" class="flex gap-4 flex-wrap">
                <div class="status-item">
                    <div class="status-indicator" id="statusDot"></div>
                    <span id="statusText">Loading...</span>
                </div>
            </div>
            <span class="text-gray-500 text-sm ml-auto">Click for details ▼</span>
        </div>

        <!-- Agent Status Expanded (Hidden by default) -->
        <div id="agentStatusExpanded" class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-6 hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold">Agent Status</h2>
                <button onclick="toggleStatusExpanded()" class="text-gray-400 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <div id="agentStatusDetails" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="text-center py-4">
                    <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-indigo-500 mx-auto"></div>
                </div>
            </div>
        </div>

        <!-- Chat Interface Container -->
        <div id="chatContainer">
            <!-- Chat will be rendered here by ChatUI -->
        </div>
    </div>

    <script>
        const apiClient = new APIClient();
        let chatUI = null;
        let agentStatus = null;
        let statusExpanded = false;

        /**
         * Helper to create a status item element safely
         */
        function createStatusItem(indicatorColor, text, isCode) {
            const item = document.createElement('div');
            item.className = 'status-item';

            if (indicatorColor) {
                const dot = document.createElement('div');
                dot.className = 'status-indicator ' + indicatorColor;
                item.appendChild(dot);
            }

            if (isCode) {
                const label = document.createElement('span');
                label.className = 'text-gray-500';
                label.textContent = 'Address:';
                item.appendChild(label);

                const code = document.createElement('code');
                code.textContent = text;
                item.appendChild(code);
            } else {
                const span = document.createElement('span');
                span.textContent = text;
                item.appendChild(span);
            }

            return item;
        }

        /**
         * Load agent status and update the collapsed status bar
         */
        async function loadAgentStatus() {
            const result = await apiClient.getStatus();

            if (result.success) {
                agentStatus = result.data;
                updateStatusBar();
                updateStatusDetails();
            } else {
                const container = document.getElementById('statusIndicators');
                while (container.firstChild) container.removeChild(container.firstChild);
                const errorItem = document.createElement('div');
                errorItem.className = 'status-item';
                const errorSpan = document.createElement('span');
                errorSpan.className = 'text-red-400';
                errorSpan.textContent = 'Failed to load status';
                errorItem.appendChild(errorSpan);
                container.appendChild(errorItem);
            }
        }

        /**
         * Update the collapsed status bar using safe DOM methods
         */
        function updateStatusBar() {
            if (!agentStatus) return;

            const agent = agentStatus.agent;
            const isOnline = true;
            const isRegistered = agent.is_registered;

            const shortAddress = agent.address
                ? agent.address.substring(0, 6) + '...' + agent.address.substring(agent.address.length - 4)
                : 'Unknown';

            const container = document.getElementById('statusIndicators');
            while (container.firstChild) container.removeChild(container.firstChild);

            container.appendChild(createStatusItem(isOnline ? 'green' : 'yellow', isOnline ? 'Online' : 'Offline', false));
            container.appendChild(createStatusItem(null, shortAddress, true));
            container.appendChild(createStatusItem(isRegistered ? 'green' : 'yellow', isRegistered ? 'Registered' : 'Unregistered', false));

            // TEE attestation always available (it's a TEE agent)
            container.appendChild(createStatusItem('green', 'TEE Secured', false));
        }

        /**
         * Update the expanded status details using safe DOM methods
         */
        function updateStatusDetails() {
            if (!agentStatus) return;

            const agent = agentStatus.agent;
            const container = document.getElementById('agentStatusDetails');
            while (container.firstChild) container.removeChild(container.firstChild);

            // Address card
            const addressCard = document.createElement('div');
            addressCard.className = 'bg-gray-800 p-4 rounded-lg';
            const addressLabel = document.createElement('p');
            addressLabel.className = 'text-sm text-gray-500 mb-1';
            addressLabel.textContent = 'Wallet Address';
            const addressValue = document.createElement('p');
            addressValue.className = 'font-mono text-sm break-all text-gray-200';
            addressValue.textContent = agent.address;
            addressCard.appendChild(addressLabel);
            addressCard.appendChild(addressValue);

            // Agent ID card
            const idCard = document.createElement('div');
            idCard.className = 'bg-gray-800 p-4 rounded-lg';
            const idLabel = document.createElement('p');
            idLabel.className = 'text-sm text-gray-500 mb-1';
            idLabel.textContent = 'Agent ID';
            const idValue = document.createElement('p');
            idValue.className = 'font-mono text-gray-200';
            idValue.textContent = agent.agent_id || 'Not registered';
            idCard.appendChild(idLabel);
            idCard.appendChild(idValue);

            // Status card
            const statusCard = document.createElement('div');
            statusCard.className = 'bg-gray-800 p-4 rounded-lg';
            const statusLabel = document.createElement('p');
            statusLabel.className = 'text-sm text-gray-500 mb-2';
            statusLabel.textContent = 'Status';

            const regStatus = document.createElement('div');
            regStatus.className = 'flex items-center gap-2';
            const regDot = document.createElement('div');
            regDot.className = 'w-2 h-2 rounded-full ' + (agent.is_registered ? 'bg-green-500' : 'bg-yellow-500');
            const regText = document.createElement('span');
            regText.className = 'text-sm text-gray-200';
            regText.textContent = agent.is_registered ? 'Registered' : 'Not Registered';
            regStatus.appendChild(regDot);
            regStatus.appendChild(regText);

            const teeStatus = document.createElement('div');
            teeStatus.className = 'flex items-center gap-2 mt-2';
            const teeDot = document.createElement('div');
            teeDot.className = 'w-2 h-2 rounded-full bg-green-500';
            const teeText = document.createElement('span');
            teeText.className = 'text-sm text-gray-200';
            teeText.textContent = 'TEE Secured (Intel TDX)';
            teeStatus.appendChild(teeDot);
            teeStatus.appendChild(teeText);

            statusCard.appendChild(statusLabel);
            statusCard.appendChild(regStatus);
            statusCard.appendChild(teeStatus);

            container.appendChild(addressCard);
            container.appendChild(idCard);
            container.appendChild(statusCard);
        }

        /**
         * Toggle between collapsed and expanded status view
         */
        function toggleStatusExpanded() {
            statusExpanded = !statusExpanded;
            document.getElementById('agentStatusCollapsed').classList.toggle('hidden', statusExpanded);
            document.getElementById('agentStatusExpanded').classList.toggle('hidden', !statusExpanded);
        }

        /**
         * Start a new chat session
         */
        async function startNewSession() {
            if (chatUI) {
                await chatUI.newSession();
                if (typeof UIUtils !== 'undefined') {
                    UIUtils.showToast('New session started', 'success');
                }
            }
        }

        /**
         * Initialize the page
         */
        document.addEventListener('DOMContentLoaded', function() {
            // Load agent status
            loadAgentStatus();

            // Initialize chat UI
            chatUI = new ChatUI('chatContainer');
        });
    </script>
</body>
</html>
